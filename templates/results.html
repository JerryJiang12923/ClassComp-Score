<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>查询结果</title>
</head>
<body>
    <h1>查询结果</h1>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>年级</th>
            <th>班级</th>
            <th>月份</th>
            <th>分数</th>
        </tr>
        {% for row in results %}
        <tr>
            <td>{{ row['id'] }}</td>
            <td>{{ row['年级'] }}</td>
            <td>{{ row['班级'] }}</td>
            <td>{{ row['月份'] }}</td>
            <td>{{ row['分数'] }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="/">返回</a>
</body>
</html>
